# Fetches OTA iCal feeds and commits data/availability-{id}.json (requires CALENDAR_FEEDS_JSON secret).
# Uses GitHub Actions minutes — monitor: repo Settings → Actions; account Billing → Actions usage.
# Docs: https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions
name: Sync iCal availability

on:
  schedule:
    # Every 30 minutes (UTC) ≈ 48 runs/day; reduce cron if you need fewer minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-calendars
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run calendar sync
        env:
          CALENDAR_FEEDS_JSON: ${{ secrets.CALENDAR_FEEDS_JSON }}
        run: node scripts/sync-calendars.cjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/availability-*.json
          if git diff --staged --quiet; then
            echo "No availability changes to commit."
          else
            git commit -m "chore(data): sync availability from iCal"
            git push
          fi
